# CI/CD Pipeline for Server (Express API)
# Builds Docker image, pushes to ECR, and updates Lambda function
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN - IAM OIDC role ARN for GitHub Actions

name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "shared/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: brickwise-api

jobs:
  deploy:
    name: Lint, Test, Build, Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Lint shared
        run: pnpm --filter shared lint

      - name: Lint server
        run: pnpm --filter server lint

      - name: Type-check shared
        run: pnpm --filter shared typecheck

      - name: Type-check server
        run: pnpm --filter server typecheck

      - name: Run shared tests
        run: pnpm --filter shared test

      - name: Run server tests
        run: pnpm --filter server test

      - name: Build server
        run: pnpm --filter server build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f server/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update Lambda function
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          LAMBDA_FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME }}
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --image-uri "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --region $AWS_REGION
