# CI/CD Pipeline for Server (Express API)
# Builds Docker image, pushes to ECR, and updates Lambda function
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN - IAM OIDC role ARN for GitHub Actions

name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "shared/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: brickwise-api

jobs:
  deploy:
    name: Lint, Test, Build, Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: lambda-brickwise-api
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Lint shared
        run: pnpm --filter shared lint

      - name: Lint server
        run: pnpm --filter server lint

      - name: Type-check shared
        run: pnpm --filter shared typecheck

      - name: Type-check server
        run: pnpm --filter server typecheck

      - name: Run shared tests
        run: pnpm --filter shared test

      - name: Run server tests
        run: pnpm --filter server test

      - name: Build server
        run: pnpm --filter server build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f server/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update Lambda function
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name "brickwise-api" \
            --image-uri "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --region $AWS_REGION

      - name: Run database migrations
        run: |
          pnpm --filter server db:generate
          if [ -n "$(git status --porcelain server/drizzle)" ]; then
            MIGRATION_BRANCH="chore/drizzle-migration-$(date +%Y%m%d%H%M%S)"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$MIGRATION_BRANCH"
            git add server/drizzle
            git commit -m "chore: auto-generate drizzle migration"
            git push -u origin "$MIGRATION_BRANCH"
            gh pr create \
              --base main \
              --head "$MIGRATION_BRANCH" \
              --title "chore: auto-generate drizzle migration" \
              --body "Auto-generated migration files from schema changes. Merge to apply migrations on next deploy." \
              --label "automated"
            echo "::warning::Migration files generated and PR created. Merge the PR and re-run this workflow to apply migrations."
          else
            DATABASE_URL=$(aws secretsmanager get-secret-value \
              --secret-id brickwise/db-url \
              --query 'SecretString' \
              --output text \
              --region $AWS_REGION)
            export DATABASE_URL
            pnpm --filter server db:migrate
          fi
        env:
          GH_TOKEN: ${{ github.token }}
