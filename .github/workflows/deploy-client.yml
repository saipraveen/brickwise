# CI/CD Pipeline for Client (React PWA)
# Deploys to Cloudflare Pages via Direct Upload
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN  - Cloudflare API token with Pages edit permission
#   CLOUDFLARE_ACCOUNT_ID - Cloudflare account ID

name: Deploy Client

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - "shared/**"
  workflow_dispatch:

concurrency:
  group: deploy-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Lint, Test, Build, Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter shared build

      - name: Verify shared build
        run: ls -la shared/dist/index.d.ts && cat shared/package.json | grep -A5 exports

      - name: Lint shared
        run: pnpm --filter shared lint

      - name: Lint client
        run: pnpm --filter client lint

      - name: Type-check shared
        run: pnpm --filter shared typecheck

      - name: Type-check client
        run: pnpm --filter client typecheck

      - name: Run shared tests
        run: pnpm --filter shared test

      - name: Run client tests
        run: pnpm --filter client test

      - name: Build client
        run: pnpm --filter client build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: brickwise
          directory: client/dist
