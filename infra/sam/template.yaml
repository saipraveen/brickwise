AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: BrickWise API - Express.js backend on Lambda via Web Adapter

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Architectures:
      - x86_64

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
  EcrRepositoryUri:
    Type: String
    Description: ECR repository URI for the API Docker image
  ImageTag:
    Type: String
    Default: latest
    Description: Docker image tag to deploy

Resources:
  BrickwiseApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: brickwise-api
      PackageType: Image
      ImageUri: !Sub "${EcrRepositoryUri}:${ImageTag}"
      Environment:
        Variables:
          PORT: "8080"
          NODE_ENV: !Ref Environment
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "https://lego.oruganti.in"
          AllowMethods:
            - "*"
          AllowHeaders:
            - "*"
          AllowCredentials: true
      Policies:
        - Statement:
            - Sid: BedrockInvokeModel
              Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-*"
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-sonnet-*"
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-5-haiku-*"
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-5-sonnet-*"
        - Statement:
            - Sid: SecretsManagerRead
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:brickwise/*"
    Metadata:
      DockerContext: ../../server
      Dockerfile: Dockerfile

Outputs:
  BrickwiseApiFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt BrickwiseApiFunction.Arn

  BrickwiseApiFunctionUrl:
    Description: Lambda Function URL
    Value: !GetAtt BrickwiseApiFunctionUrl.FunctionUrl
